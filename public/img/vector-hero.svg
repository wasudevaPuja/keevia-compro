<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1c29" />
      <stop offset="50%" stop-color="#12141a" />
      <stop offset="100%" stop-color="#0a0a0f" />
    </linearGradient>

    <!-- Decorative Gradient 1 -->
    <linearGradient id="decorative1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#6b21a8" stop-opacity="0.05" />
    </linearGradient>

    <!-- Vector Abstract Pattern -->
    <pattern id="elegantPattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M50 0 C77.61 0 100 22.39 100 50 C100 77.61 77.61 100 50 100 C22.39 100 0 77.61 0 50 C0 22.39 22.39 0 50 0 Z M50 2 C76.51 2 98 23.49 98 50 C98 76.51 76.51 98 50 98 C23.49 98 2 76.51 2 50 C2 23.49 23.49 2 50 2 Z" fill="rgba(255,255,255,0.02)" />
      <path d="M0 50 L100 50 M50 0 L50 100" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    </pattern>

    <!-- Blur Filters for Glow Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <!-- Background Pattern -->
  <rect width="100%" height="100%" fill="url(#elegantPattern)" />

  <!-- Large Abstract Shapes with Glow -->
  <circle cx="20%" cy="20%" r="400" fill="url(#decorative1)" filter="url(#glow)" />
  <circle cx="80%" cy="80%" r="500" fill="url(#decorative1)" filter="url(#glow)" />
  
  <!-- Subtle Vector Ornaments -->
  <g opacity="0.3">
    <!-- Star elements -->
    <path d="M300 150 L310 180 L340 190 L310 200 L300 230 L290 200 L260 190 L290 180 Z" fill="#f9a8d4" opacity="0.5" />
    <path d="M1500 800 L1505 815 L1520 820 L1505 825 L1500 840 L1495 825 L1480 820 L1495 815 Z" fill="#f9a8d4" opacity="0.3" />
    <path d="M1600 200 L1603 210 L1613 213 L1603 216 L1600 226 L1597 216 L1587 213 L1597 210 Z" fill="#ffffff" opacity="0.4" />
    <path d="M400 900 L403 910 L413 913 L403 916 L400 926 L397 916 L387 913 L397 910 Z" fill="#ffffff" opacity="0.2" />
  </g>
  
  <!-- Abstract Wave Lines -->
  <path d="M0 700 Q 480 500 960 700 T 1920 700 L 1920 1080 L 0 1080 Z" fill="rgba(249,168,212,0.03)" />
  <path d="M0 900 Q 480 700 960 900 T 1920 900 L 1920 1080 L 0 1080 Z" fill="rgba(249,168,212,0.05)" />
</svg>
